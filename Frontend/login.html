<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - Glow & Style</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">GLOW & STYLE <span>Salon & Spa</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="stylists.html">Stylists</a></li>
                <li><a href="booking.html">Book Appointment</a></li>
            </ul>
            <div id="nav-auth-container"></div>
        </nav>
    </header>

    <div class="auth-container">
        <div class="glass-card">
            <h2 style="font-family: var(--font-serif); text-align: center; margin-bottom: 2rem; color: var(--primary);">Sign In</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" class="form-control" id="login-email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" class="form-control" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Login</button>
            </form>
            <div class="auth-footer">
                <p>New customer? <a href="register.html">Register Here</a></p>
                <p style="margin-top:0.8rem; font-size:0.75rem; color:var(--text-muted);">Admin? Use email: <code style="color:var(--primary)">admin@salon.com</code> & pass: <code style="color:var(--primary)">admin123</code></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
