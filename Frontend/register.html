<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration - Glow & Style</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">GLOW & STYLE <span>Salon & Spa</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="stylists.html">Stylists</a></li>
                <li><a href="booking.html">Book Appointment</a></li>
            </ul>
            <div id="nav-auth-container"></div>
        </nav>
    </header>

    <div class="auth-container" style="max-width: 550px;">
        <div class="glass-card">
            <h2 style="font-family: var(--font-serif); text-align: center; margin-bottom: 2rem; color: var(--primary);">Customer Registration</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" class="form-control" id="reg-name" placeholder="Rahul Sharma" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" class="form-control" id="reg-email" placeholder="rahul@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="reg-phone">Phone Number</label>
                    <input type="tel" class="form-control" id="reg-phone" placeholder="9876543210" required>
                </div>
                <div class="form-group">
                    <label for="reg-gender">Gender</label>
                    <select class="form-control form-select" id="reg-gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" class="form-control" id="reg-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-confirm-password">Confirm Password</label>
                        <input type="password" class="form-control" id="reg-confirm-password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Register Account</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign In Here</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
